<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简贪吃蛇</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: sans-serif;
            color: #ecf0f1;
        }
        .score-container {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #game-board {
            position: relative;
            background-color: #ecf0f1;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #menu h1 { margin: 0 0 20px 0; color: #e74c3c; }
        button {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #2ecc71; }
        .tips { margin-top: 15px; color: #bdc3c7; font-size: 14px; }
    </style>
</head>
<body>

    <div class="score-container">当前分数: <span id="score">0</span></div>

    <div id="game-board">
        <canvas id="canvas" width="400" height="400"></canvas>
        <div id="menu">
            <h1 id="game-over-text" style="display: none;">游戏结束!</h1>
            <button id="start-btn">开始游戏</button>
        </div>
    </div>
    
    <div class="tips">⌨️ 使用键盘方向键 (↑ ↓ ← →) 控制蛇的移动</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const menuEl = document.getElementById('menu');
        const startBtn = document.getElementById('start-btn');
        const gameOverText = document.getElementById('game-over-text');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let changingDirection = false;

        function resetGame() {
            snake = [
                {x: 10, y: 10},
                {x: 10, y: 11},
                {x: 10, y: 12}
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreEl.innerText = score;
            spawnFood();
            changingDirection = false;
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 防止食物生成在蛇身上
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) return spawnFood();
            }
        }

        function drawGame() {
            changingDirection = false;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // 撞墙或撞自己检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || 
                snake.some(part => part.x === head.x && part.y === head.y)) {
                clearInterval(gameInterval);
                menuEl.style.display = 'flex';
                gameOverText.style.display = 'block';
                startBtn.innerText = '重新开始';
                return;
            }

            snake.unshift(head);

            // 吃食物检测
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            // 绘制背景
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI*2);
            ctx.fill();

            // 绘制蛇
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#27ae60' : '#2ecc71';
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            if (changingDirection) return;
            
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (e.key === 'ArrowLeft' && !goingRight) { dx = -1; dy = 0; changingDirection = true; }
            if (e.key === 'ArrowUp' && !goingDown) { dx = 0; dy = -1; changingDirection = true; }
            if (e.key === 'ArrowRight' && !goingLeft) { dx = 1; dy = 0; changingDirection = true; }
            if (e.key === 'ArrowDown' && !goingUp) { dx = 0; dy = 1; changingDirection = true; }
        });

        startBtn.addEventListener('click', () => {
            menuEl.style.display = 'none';
            resetGame();
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(drawGame, 100);
        });
    </script>
</body>
</html>
